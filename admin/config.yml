backend:
  name: github
  repo: adiprnm/weblog
  branch: main
  base_url: "https://auth.adipurnm.com"

media_folder: "assets/images/2026"
public_folder: "/assets/images/2026"

collections:
  - name: "posts"
    label: "Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: "frontmatter"
    extension: "md"
    fields:
      - { label: "layout", name: "layout", widget: "string", default: "default" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Tags", name: "tags", widget: "string" }
  - name: "adionrails"
    label: "Adi on Rails"
    folder: "_adionrails"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: "frontmatter"
    extension: "md"
    fields:
      - { label: "layout", name: "layout", widget: "string", default: "default" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
